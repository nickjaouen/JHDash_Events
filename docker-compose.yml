# Run this command to start the database:
# docker compose up
services:
  db:
    hostname: 127.0.0.1
    image: pgvector/pgvector:pg16
    ports:
      - 5432:5432
    restart: always
    environment:
      - POSTGRES_DB=jhdash_agents
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres